<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finalizar Compra | UNICORN</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f6f7;
      color: #333;
    }

    header {
      background-color: #fff;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    }

    .logo {
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .logo img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .logo span {
      font-size: 1.8rem;
      font-weight: bold;
      color: #0e008b;
    }

    main {
      max-width: 800px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
    }

    h1 {
      color: #0e008b;
      text-align: center;
      margin-bottom: 30px;
    }

    .resumen {
      margin-bottom: 30px;
    }

    .resumen ul {
      list-style: none;
      padding: 0;
    }

    .resumen li {
      padding: 10px 0;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
    }

    .formulario input,
    .formulario button {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #0e008b;
      color: white;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background-color: #0077cc;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo" onclick="window.location.href='UNICORN.html'">
      <img src="https://agro.unicorn.com.co/web/image/16724/20200424%20auls_planobordeazul_v1.png" alt="Logo UNICORN"/>
      <span>UNICORN</span>
    </div>
    <nav>
      <a href="productos.html">Productos</a>
      <a href="carrito.html">Carrito 🛒</a>
    </nav>
  </header>

  <main>
    <h1>Resumen de Compra</h1>

    <div class="resumen" id="resumen-carrito">
      <ul id="lista-carrito"></ul>
    </div>

    <div class="formulario">
      <input type="text" id="nombre" placeholder="Nombre completo" required>
      <input type="email" id="correo" placeholder="Correo electrónico" required>
      <input type="tel" id="telefono" placeholder="Teléfono de contacto" required>
      <button id="boton-pago">Pagar con MercadoPago</button>
    </div>
  </main>

  <script>
    const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
    const listaCarrito = document.getElementById("lista-carrito");

    carrito.forEach(prod => {
      const li = document.createElement("li");
      li.innerHTML = `
        <span>${prod.nombre}</span>
        <strong>${prod.precio}</strong>
      `;
      listaCarrito.appendChild(li);
    });

    document.getElementById("boton-pago").addEventListener("click", () => {
      const nombre = document.getElementById("nombre").value;
      const correo = document.getElementById("correo").value;
      const telefono = document.getElementById("telefono").value;

      if (!nombre || !correo || !telefono) {
        alert("Por favor completa todos los campos.");
        return;
      }

      const total = carrito.reduce((sum, prod) => {
        const precio = parseFloat(prod.precio.replace(/[^0-9.]/g, '')) || 0;
        return sum + precio;
      }, 0);

      alert(`Gracias, ${nombre}. Se procesará el pago por $${total.toLocaleString('es-CO')}.
(Integración con MercadoPago pendiente de backend).`);
    });
  </script>
</body>
</html>
