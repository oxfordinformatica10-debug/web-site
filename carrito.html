<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carrito y Checkout | UNICORN</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      background-color: #f4f6f8;
      color: #111;
    }

    header {
      background-color: #ffffff;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .logo {
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .logo img {
      width: 40px;
      height: 40px;
      margin-right: 10px;
    }

    .logo span {
      font-size: 1.8rem;
      font-weight: bold;
      color: #0e008b;
    }

    main {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
    }

    .cart-section, .checkout-section {
      background-color: #fff;
      border-radius: 12px;
      padding: 30px;
      flex: 1;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
      min-width: 300px;
    }

    h2 {
      color: #0e008b;
      margin-bottom: 20px;
    }

    .cart-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }

    .cart-item img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
      margin-right: 15px;
    }

    .cart-item-name {
      flex: 1;
    }

    .remove-btn {
      background: transparent;
      border: none;
      color: #cc0000;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .total {
      text-align: right;
      font-weight: bold;
      font-size: 1.2rem;
      margin-top: 20px;
    }

    form label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    form input, form select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .pay-btn {
      margin-top: 25px;
      width: 100%;
      padding: 14px;
      background-color: #0e008b;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    .pay-btn:hover {
      background-color: #0070e0;
    }

    @media (max-width: 768px) {
      main {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="window.location.href='UNICORN.html'">
    <img src="https://agro.unicorn.com.co/web/image/16724/20200424%20auls_planobordeazul_v1.png" alt="Logo UNICORN"/>
    <span>UNICORN</span>
  </div>
</header>

<main>
  <section class="cart-section">
    <h2>🛒 Carrito de Compras</h2>
    <div id="cart-items"></div>
    <div class="total">Total: <span id="total-amount">$0</span></div>
  </section>

  <section class="checkout-section">
    <h2>💳 Datos para el Pago</h2>
    <form id="checkout-form">
      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" required>

      <label for="email">Correo electrónico</label>
      <input type="email" id="email" required>

      <label for="direccion">Dirección de envío</label>
      <input type="text" id="direccion" required>

      <label for="tarjeta">Número de tarjeta</label>
      <input type="text" id="tarjeta" placeholder="XXXX-XXXX-XXXX-XXXX" required>

      <label for="vencimiento">Fecha de vencimiento</label>
      <input type="month" id="vencimiento" required>

      <label for="cvv">CVV</label>
      <input type="text" id="cvv" maxlength="3" required>

      <button type="submit" class="pay-btn">Pagar ahora</button>
    </form>
  </section>
</main>

<script>
  let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

  function renderCarrito() {
    const contenedor = document.getElementById("cart-items");
    const total = document.getElementById("total-amount");
    contenedor.innerHTML = "";
    let suma = 0;

    if (carrito.length === 0) {
      contenedor.innerHTML = "<p>No hay productos en el carrito.</p>";
      total.textContent = "$0";
      return;
    }

    carrito.forEach((producto, index) => {
      const item = document.createElement("div");
      item.className = "cart-item";
      item.innerHTML = `
        <img src="${producto.imagen}" alt="${producto.nombre}" />
        <div class="cart-item-name">
          <strong>${producto.nombre}</strong><br>
          ${producto.precio}
        </div>
        <button class="remove-btn" onclick="eliminarDelCarrito(${index})">Eliminar</button>
      `;
      contenedor.appendChild(item);
      suma += parseFloat(producto.precio.replace(/[^\d.-]/g, ""));
    });

    total.textContent = "$" + suma.toLocaleString("es-CO");
  }

  function eliminarDelCarrito(index) {
    carrito.splice(index, 1);
    localStorage.setItem("carrito", JSON.stringify(carrito));
    renderCarrito();
  }

  document.getElementById("checkout-form").addEventListener("submit", function(e) {
    e.preventDefault();
    alert("✅ Pago procesado exitosamente. ¡Gracias por tu compra!");
    carrito = [];
    localStorage.setItem("carrito", JSON.stringify([]));
    renderCarrito();
    this.reset();
  });

  renderCarrito();
</script>

</body>
</html>
