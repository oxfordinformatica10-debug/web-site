  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      background-color: #f5f6f7;
      color: #111;
    }

    header {
      background-color: #ffffff;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .logo {
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .logo img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .logo span {
      font-size: 1.8rem;
      font-weight: bold;
      color: #0e008b;
    }

    nav a {
      margin-left: 20px;
      color: #000;
      text-decoration: none;
      font-weight: 500;
    }

    h1 {
      text-align: center;
      padding: 60px 20px 10px;
      font-size: 2.8rem;
      color: #0e008b;
    }

    .separador {
      width: 60px;
      height: 3px;
      background-color: #0e008b;
      margin: 0 auto 40px;
    }

    h2 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 500;
      color: #333;
      margin-bottom: 10px;
    }

.categorias-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 30px;
  max-width: 1200px;
  margin: 60px auto;
  padding: 0 20px;
}

.categoria-item {
  text-decoration: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  background-color: #fff;
  border: none;
  transition: transform 0.3s ease;
  padding-bottom: 10px;
}

.categoria-item:hover {
  transform: translateY(-4px);
}

.imagen-contenedor {
  width: 100%;
  height: 180px;
  background-color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
}

.imagen-contenedor img {
  max-height: 100%;
  max-width: 90%;
  object-fit: contain;
  display: block;
}

.categoria-texto {
  width: 100%;
  padding: 16px 10px 10px;
  font-weight: 600;
  font-size: 1rem;
  color: #111;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid #ddd;
  margin-top: 10px;
}

.categoria-texto .flecha {
  font-size: 1.5rem;
  color: #0e008b;
}

    @media (max-width: 600px) {
      .categoria-card img {
        height: 140px;
      }
    }
  </style>
</head>
